name: farmacia
prefect-version: 3.6.11

pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/HSJD-BI/update-precios-farmacia.git
      branch: "{{ prefect.variables.deployment_branch }}"
      credentials: "{{ prefect.blocks.github-credentials.bi-github }}"  
  - prefect.deployments.steps.run_shell_script:
      script: uv pip install -r requirements.txt
      stream_output: true
      directory: "{{ clone-step.directory }}"

deployments:
  - name: deploy-carga-items-farmacia
    descripcion: ""
    flow_name: carga-items-farmacia
    entrypoint: flows/flow_carga_items.py:carga_items_farmacia
    work_pool:
      name: "vm-farmacia"
      job_variables:
        env:
          USUARIO_TS: "DEMO"
          PASSWORD_TS: "TEST"
    schedules:
      - cron: "0 0 * * *"
        slug: "daily-midnight-carga-items"
        timezone: "America/Buenos_Aires"
        active: false
  - name: deploy-scrapping-farmacia
    descripcion: ""
    flow_name: scrapping-carga-precios
    entrypoint: flows/flow_scrapping.py:scrapping_carga_precios
    work_pool:
      name: "vm-farmacia"
      job_variables:
        env:
          USUARIO_TS: "DEMO"
          PASSWORD_TS: "TEST"
    schedules:
      - cron: "15 0 * * *"
        slug: "daily-0015-scrapping"
        timezone: "America/Buenos_Aires"
        active: true
  - name: deploy-notify-email
    descripcion: ""
    flow_name: notify_email
    entrypoint: flows/flow_notify_email.py:notify_email
    work_pool:
      name: "vm-farmacia"
      job_variables:
        env:
          USUARIO_TS: "DEMO"
          PASSWORD_TS: "TEST"
  - name: deploy-reminder-items-pend
    descripcion: "envio mail items pendientes de revisar app farmacia"
    flow_name: reminder_items_pend
    entrypoint: flows/flow_reminder_items_pend.py:reminder_items_pend
    work_pool:
      name: "vm-farmacia"
      job_variables:
        env:
          USUARIO_TS: "DEMO"
          PASSWORD_TS: "TEST"
  - name: deploy-chequeo-precios-ts
    descripcion: ""
    flow_name: chequeo-precios-ts
    entrypoint: flows/flow_chequeo_precios_ts.py:chequeo_precios_ts
    work_pool:
      name: "vm-farmacia"
      job_variables:
        env:
          USUARIO_TS: "DEMO"
          PASSWORD_TS: "TEST"
    schedules:
      - cron: "0 0 * * *"
        slug: "daily-midnight-chequeo-precios-ts"
        timezone: "America/Buenos_Aires"
        active: true
  - name: deploy-carga-pag-medicamentos
    descripcion: ""
    flow_name: carga-pag-medicamentos-farm
    entrypoint: flows/flow_carga_pag_medicamentos.py:carga_pag_medicamentos
    work_pool:
      name: "vm-farmacia"
      job_variables:
        env:
          USUARIO_TS: "DEMO"
          PASSWORD_TS: "TEST"
    schedules:
      - cron: "4 0 * * *"
        slug: "daily-midnight-carga-pag-medicamentos-"
        timezone: "America/Buenos_Aires"
        active: true