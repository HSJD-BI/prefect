name: upload quirofano
prefect-version: 3.6.25

pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/HSJD-BI/quirofano-etl.git
      branch: "{{ prefect.variables.deployment_branch }}"
      credentials: "{{ prefect.blocks.github-credentials.bi-github }}"
  - prefect.deployments.steps.run_shell_script:
      script: uv pip install -r requirements.txt
      stream_output: true
      directory: "{{ clone-step.directory }}"

deployments:
  - name: upload-quirofano
    descripcion: ""
    flow_name: quirofano-etl
    entrypoint: flows/flow_upload_incremental_data.py:quirofano_etl_flow
    tags: ["etl"]
    work_pool:
      name: "vm_reportes"
    schedules:
      - cron: "0 0 * * *"
        timezone: "America/Buenos_Aires"
        active: true